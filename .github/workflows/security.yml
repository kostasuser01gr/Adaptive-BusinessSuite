name: Security

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
      - "hotfix/**"
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scans:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            mobile/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        run: npm --prefix mobile ci

      - name: Root production audit
        run: npm audit --omit=dev

      - name: Mobile production audit
        run: npm --prefix mobile audit --omit=dev

      - name: Trivy filesystem scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            aquasec/trivy:0.58.2 fs \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-dirs /repo/node_modules \
            --skip-dirs /repo/dist \
            --skip-dirs /repo/mobile/node_modules \
            --skip-dirs /repo/mobile/dist \
            --skip-dirs /repo/nexus-os \
            /repo

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.0"
        run: |
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          chmod +x /tmp/gitleaks

      - name: Gitleaks scan
        run: /tmp/gitleaks git --redact
