name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
      - "hotfix/**"
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web_and_backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      DATABASE_SSL_MODE: disable
      SESSION_SECRET: ci-test-only-not-production-session-secret-00000001
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Push database schema
        run: npx drizzle-kit push

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Coverage
        run: npm run coverage

      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-report
          path: coverage

  e2e:
    runs-on: ubuntu-latest
    needs: web_and_backend
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: e2edb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/e2edb
      DATABASE_SSL_MODE: disable
      SESSION_SECRET: e2e-ci-only-not-production-session-secret-00000002
      SESSION_COOKIE_NAME: abs.sid
      SESSION_COOKIE_SECURE: "false"
      RATE_LIMIT_MAX: "10000"
      PORT: "5000"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build

      - name: Push database schema
        run: npx drizzle-kit push

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "mobile/package-lock.json"

      - name: Install mobile dependencies
        run: npm --prefix mobile ci

      - name: Mobile typecheck
        run: npm --prefix mobile run typecheck

      - name: Mobile doctor
        run: npm run doctor:mobile

      - name: Expo export
        run: cd mobile && npx expo export --platform all
